name: Update register data

on:
  schedule:
    - cron: "17 6,18 * * *" # 6:17am and 6:17pm UTC, every day
  workflow_dispatch: {} # also lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fetch latest register data
        run: node build.js
      - name: Commit and push if the data changed
        run: |
          git config user.name "register-update-bot"
          git config user.email "register-update-bot@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "No changes in the register."
          else
            git commit -m "Update register data"
            git push
          fi
