<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're in — Farage Money Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;700;900&family=Lora:ital@1&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a; color: #fff; font-family: "Jost", sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .box { max-width: 560px; text-align: center; }
  h1 { font-size: 44px; font-weight: 900; text-transform: uppercase; line-height: 1.1; margin-bottom: 16px; }
  h1 span { background: #f8d602; color: #0a0a0a; padding: 0 10px; display: inline-block; transform: rotate(-1deg); }
  p { font-size: 18px; font-family: "Lora", serif; font-style: italic; color: #c8c8c8; margin-bottom: 26px; }
  a {
    display: inline-block; background: #f8d602; color: #0a0a0a; text-decoration: none;
    font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; padding: 12px 28px;
    border: 3px solid #f8d602;
  }
  a:hover { background: #ff3a0d; border-color: #ff3a0d; color: #fff; }
</style>
</head>
<body>
  <div class="box">
    <h1>You're <span>in</span></h1>
    <p>Thanks for signing up. We'll be in touch about organising in your area.</p>
    <a href="/">Back to the monitor</a>
  </div>
</body>
</html>
